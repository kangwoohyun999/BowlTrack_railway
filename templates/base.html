<!DOCTYPE html>
<html lang="ko" data-theme="{{ 'dark' if user and user.dark_mode else 'light' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎳 BowlTrack{% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0ede8;
      --surface: #ffffff;
      --surface2: #f7f4f0;
      --border: #e0d9d0;
      --text: #1a1410;
      --text2: #6b5e52;
      --accent: #c8402a;
      --accent2: #e8622a;
      --pin: #1a3a5c;
      --pin2: #2a5a8c;
      --gold: #d4a017;
      --shadow: rgba(0,0,0,0.08);
      --nav-h: 68px;
    }
    [data-theme="dark"] {
      --bg: #0f0e0c;
      --surface: #1c1a17;
      --surface2: #252320;
      --border: #3a3530;
      --text: #f0ede8;
      --text2: #9a8e82;
      --accent: #e85535;
      --accent2: #ff7a45;
      --pin: #4a8abf;
      --pin2: #6ab0e8;
      --gold: #f0b930;
      --shadow: rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    /* ── HEADER ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .topbar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
      color: var(--accent);
    }
    .topbar-style-badge {
      background: var(--pin);
      color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      letter-spacing: 0.5px;
    }
    /* ── MAIN CONTENT ── */
    .main-content {
      margin-top: 56px;
      margin-bottom: calc(var(--nav-h) + 12px);
      padding: 20px 16px;
      max-width: 480px;
      width: 100%;
      margin-left: auto; margin-right: auto;
    }
    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      box-shadow: 0 -4px 20px var(--shadow);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none;
      color: var(--text2);
      font-size: 10px; font-weight: 500;
      gap: 4px; padding: 8px 0;
      transition: color 0.2s;
      cursor: pointer; border: none; background: none;
    }
    .nav-item:hover, .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 24px; height: 24px; }
    .nav-center { position: relative; }
    .nav-center .nav-item {
      background: var(--accent);
      color: #fff !important;
      width: 52px; height: 52px;
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(200,64,42,0.4);
      margin-bottom: 12px;
    }
    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; letter-spacing: 2px;
      color: var(--text);
    }
    .page-header p { color: var(--text2); font-size: 13px; margin-top: 4px; }
    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }
    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 12px 24px; border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
      transition: all 0.2s; text-decoration: none;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 16px rgba(200,64,42,0.3);
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-full { width: 100%; }
    /* ── INPUTS ── */
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; font-weight: 700;
      color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
    .input-group input, .input-group textarea, .input-group select {
      width: 100%;
      background: var(--surface2); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
      border-color: var(--accent);
    }
    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      padding: 10px 24px; border-radius: 24px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s;
      z-index: 200; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.12s; }
    .fade-up-3 { animation-delay: 0.19s; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

<!-- TOP BAR -->
{% if user %}
<header class="topbar">
  <span class="topbar-logo">BOWLTRACK</span>
  {% set style_labels = {'dumless': '덤리스', 'twohand': '투핸드', 'cranker': '크랭커'} %}
  <span class="topbar-style-badge">🎳 {{ style_labels.get(user.style, '덤리스') }}</span>
</header>
{% endif %}

<!-- MAIN -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- BOTTOM NAV -->
{% if user %}
<nav class="bottom-nav">
  <a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    프로필
  </a>
  <div class="nav-center">
    <a href="/home" class="nav-item {% if request.path == '/home' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
  </div>
  <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    설정
  </a>
</nav>
{% endif %}

<div class="toast" id="toast"></div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
