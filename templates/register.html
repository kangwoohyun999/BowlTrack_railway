<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BowlTrack — 회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #0f0e0c;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex; align-items: flex-start; justify-content: center;
      position: relative; overflow-y: auto; overflow-x: hidden;
      padding: 40px 0;
    }
    body::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 80px,
        rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 82px);
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .orb1 { width: 350px; height: 350px; background: rgba(26,58,92,0.25); top: -80px; left: -60px; }
    .orb2 { width: 300px; height: 300px; background: rgba(200,64,42,0.18); bottom: -80px; right: -60px; }
    .wrap { position: relative; z-index: 1; width: 100%; max-width: 380px; padding: 16px; animation: fadeIn 0.5s ease both; }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-logo { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 4px; color: #c8402a; }
    .brand-sub { font-size: 11px; letter-spacing: 3px; color: #6b5e52; text-transform: uppercase; }
    .card { background: #1c1a17; border: 1px solid #3a3530; border-radius: 20px; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .card-title { font-size: 18px; font-weight: 700; color: #f0ede8; margin-bottom: 20px; }
    .input-group { margin-bottom: 14px; }
    .input-group label { display: block; font-size: 11px; font-weight: 700; color: #6b5e52; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
    .input-group input, .input-group select {
      width: 100%; background: #252320; color: #f0ede8;
      border: 1.5px solid #3a3530; border-radius: 10px; padding: 11px 14px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .input-group input:focus, .input-group select:focus { border-color: #c8402a; }
    .input-group select option { background: #252320; }
    .style-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 6px; }
    .style-card {
      border: 1.5px solid #3a3530; border-radius: 10px; padding: 10px 6px;
      text-align: center; cursor: pointer; transition: all 0.2s;
      background: #252320;
    }
    .style-card:hover { border-color: #c8402a; }
    .style-card.selected { border-color: #c8402a; background: rgba(200,64,42,0.1); }
    .style-card input { display: none; }
    .style-emoji { font-size: 20px; display: block; margin-bottom: 4px; }
    .style-name { font-size: 12px; font-weight: 700; color: #f0ede8; }
    .style-eng { font-size: 10px; color: #6b5e52; }
    .error-msg { background: rgba(200,64,42,0.12); border: 1px solid rgba(200,64,42,0.3); color: #e85535; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
    .btn { width: 100%; padding: 13px; background: #c8402a; color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(200,64,42,0.35); margin-top: 6px; }
    .btn:hover { background: #e85535; transform: translateY(-1px); }
    .login-link { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #6b5e52; text-decoration: none; }
    .login-link span { color: #c8402a; font-weight: 700; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="wrap">
    <div class="brand">
      <div class="brand-logo">BOWLTRACK</div>
      <div class="brand-sub">회원가입</div>
    </div>
    <div class="card">
      <div class="card-title">새 계정 만들기</div>
      {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
      <form method="POST">
        <div class="input-group">
          <label>아이디</label>
          <input type="text" name="username" placeholder="아이디 (영문, 숫자)" required>
        </div>
        <div class="input-group">
          <label>비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호" required>
        </div>
        <div class="input-group">
          <label>닉네임</label>
          <input type="text" name="nickname" placeholder="표시될 이름 (선택)">
        </div>
        <div class="input-group">
          <label>나의 구질</label>
          <div class="style-cards">
            <label class="style-card selected" id="sc-dumless">
              <input type="radio" name="style" value="dumless" checked>
              <span class="style-emoji">🏹</span>
              <div class="style-name">덤리스</div>
              <div class="style-eng">Thumbless</div>
            </label>
            <label class="style-card" id="sc-twohand">
              <input type="radio" name="style" value="twohand">
              <span class="style-emoji">🤲</span>
              <div class="style-name">투핸드</div>
              <div class="style-eng">Two-hand</div>
            </label>
            <label class="style-card" id="sc-cranker">
              <input type="radio" name="style" value="cranker">
              <span class="style-emoji">💥</span>
              <div class="style-name">크랭커</div>
              <div class="style-eng">Cranker</div>
            </label>
          </div>
        </div>
        <button type="submit" class="btn">🎳 가입하기</button>
      </form>
      <a href="/login" class="login-link">이미 계정이 있나요? <span>로그인</span></a>
    </div>
  </div>
  <script>
    document.querySelectorAll('.style-card input').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
        radio.closest('.style-card').classList.add('selected');
      });
    });
  </script>
</body>
</html>
