<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BowlTrack — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f0e0c;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex; align-items: flex-start; justify-content: center;
      position: relative; overflow-y: auto; overflow-x: hidden;
      padding: 40px 0;
    }
    /* Lane lines background */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent, transparent 80px,
        rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 82px
      );
    }
    /* Glow orbs */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); pointer-events: none;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(200,64,42,0.18); top: -100px; right: -80px; }
    .orb2 { width: 300px; height: 300px; background: rgba(26,58,92,0.25); bottom: -80px; left: -60px; }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      padding: 16px;
    }
    .brand {
      text-align: center; margin-bottom: 36px;
    }
    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px; letter-spacing: 6px;
      color: #c8402a;
      line-height: 1;
      text-shadow: 0 0 40px rgba(200,64,42,0.5);
    }
    .brand-sub {
      font-size: 11px; font-weight: 500; letter-spacing: 4px;
      color: #6b5e52; text-transform: uppercase; margin-top: 4px;
    }
    .pins-row {
      display: flex; justify-content: center; gap: 6px; margin-top: 12px;
    }
    .pin-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #f0ede8;
      box-shadow: 0 0 8px rgba(240,237,232,0.4);
    }
    .pin-dot.strike { background: #c8402a; box-shadow: 0 0 8px rgba(200,64,42,0.6); }

    .card {
      background: #1c1a17;
      border: 1px solid #3a3530;
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .card-title {
      font-size: 18px; font-weight: 700; color: #f0ede8;
      margin-bottom: 24px;
    }
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block; font-size: 11px; font-weight: 700;
      color: #6b5e52; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase;
    }
    .input-group input {
      width: 100%;
      background: #252320; color: #f0ede8;
      border: 1.5px solid #3a3530;
      border-radius: 10px; padding: 12px 14px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #c8402a; }
    .error-msg {
      background: rgba(200,64,42,0.12); border: 1px solid rgba(200,64,42,0.3);
      color: #e85535; border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px;
    }
    .btn-login {
      width: 100%; padding: 14px;
      background: #c8402a; color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(200,64,42,0.35);
      margin-top: 4px;
    }
    .btn-login:hover { background: #e85535; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(200,64,42,0.5); }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: #6b5e52; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #3a3530;
    }
    .btn-register {
      width: 100%; padding: 12px;
      background: transparent; color: #9a8e82;
      border: 1.5px solid #3a3530;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: block; text-align: center;
    }
    .btn-register:hover { border-color: #c8402a; color: #c8402a; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-wrap { animation: fadeIn 0.5s ease both; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="login-wrap">
    <div class="brand">
      <div class="brand-logo">BOWLTRACK</div>
      <div class="brand-sub">볼링 기록 매니저</div>
      <div class="pins-row">
        <div class="pin-dot strike"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot strike"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot strike"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">로그인</div>
      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="input-group">
          <label>아이디</label>
          <input type="text" name="username" placeholder="아이디를 입력하세요" required autocomplete="username">
        </div>
        <div class="input-group">
          <label>비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">🎳 로그인</button>
      </form>
      <div class="divider">또는</div>
      <a href="/register" class="btn-register">회원가입</a>
    </div>
  </div>
</body>
</html>
